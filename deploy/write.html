<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Write · The Oracle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <style>
    :root {
      --font-display: 'Cinzel', serif;
      --font-condensed: 'Bebas Neue', sans-serif;
      --font-body: 'Barlow', system-ui, sans-serif;
      --purple: #6a0fd6;
      --purple-bright: #8b2fff;
      --purple-dark: #3b0075;
      --silver-light: #e8e8e8;
      --black: #000000;
      --black-card: #0d0d0d;
      --text-muted: #888;
      --green: #3fb968;
      --red: #e5484d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--silver-light);
      font-family: var(--font-body);
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(106, 15, 214, 0.3);
    }
    .topbar .brand {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--silver-light);
      text-decoration: none;
    }
    .topbar .brand span { color: var(--purple-bright); }
    .topbar .right { display: flex; align-items: center; gap: 14px; }
    .topbar a.view-link {
      font-family: var(--font-condensed);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
    }
    .topbar a.view-link:hover { color: var(--purple-bright); }

    /* ── GATE ── */
    .gate {
      max-width: 420px;
      margin: 120px auto;
      background: var(--black-card);
      border: 1px solid rgba(106,15,214,0.3);
      padding: 40px 36px;
      text-align: center;
    }
    .gate h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .gate p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .gate-error { color: var(--red); font-size: 13px; margin-top: 14px; min-height: 18px; }

    /* ── LAYOUT ── */
    .wrap { max-width: 1280px; margin: 0 auto; padding: 32px; }
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    .col-head {
      font-family: var(--font-condensed);
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--purple-bright);
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-family: var(--font-condensed);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 16px 0 6px;
    }
    input, textarea, select {
      width: 100%;
      background: var(--black-card);
      border: 1px solid rgba(106,15,214,0.3);
      color: var(--silver-light);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: rgba(139,47,255,0.7); }
    textarea#body { min-height: 460px; resize: vertical; line-height: 1.6; font-size: 15px; }
    .hint { font-size: 12px; color: #666; margin-top: 4px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .btn {
      font-family: var(--font-condensed);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 26px;
      border: none;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-primary:hover { background: var(--purple-bright); }
    .btn-ghost { background: transparent; border: 1px solid rgba(192,192,192,0.3); color: var(--silver-light); clip-path: none; }
    .btn-ghost:hover { border-color: var(--purple-bright); color: var(--purple-bright); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(229,72,77,0.4); clip-path: none; padding: 7px 14px; font-size: 12px; }
    .btn-danger:hover { background: rgba(229,72,77,0.12); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .actions { display: flex; gap: 12px; align-items: center; margin-top: 24px; flex-wrap: wrap; }
    .save-status { font-size: 13px; letter-spacing: 1px; color: var(--text-muted); }
    .save-status.ok { color: var(--green); }
    .save-status.err { color: var(--red); }

    /* ── PREVIEW ── */
    .preview {
      background: var(--black-card);
      border: 1px solid rgba(106,15,214,0.2);
      padding: 28px 30px;
      min-height: 460px;
    }
    .preview-cover { width: 100%; margin-bottom: 20px; border: 1px solid rgba(106,15,214,0.3); }
    .pv-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .pv-tag { font-family: var(--font-condensed); font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--purple-bright); }
    .pv-title { font-family: var(--font-display); font-weight: 800; font-size: 34px; line-height: 1.15; margin-bottom: 18px; }
    .pv-body { font-size: 16px; line-height: 1.8; color: #d8d8d8; }
    .pv-body h2 { font-family: var(--font-display); font-size: 26px; margin: 30px 0 12px; }
    .pv-body h3 { font-family: var(--font-condensed); font-size: 21px; letter-spacing: 1px; text-transform: uppercase; color: var(--purple-bright); margin: 24px 0 10px; }
    .pv-body p { margin: 0 0 18px; }
    .pv-body a { color: var(--purple-bright); }
    .pv-body strong { color: var(--silver-light); }
    .pv-body ul, .pv-body ol { margin: 0 0 18px; padding-left: 24px; }
    .pv-body blockquote { border-left: 3px solid var(--purple-bright); background: rgba(139,47,255,0.06); padding: 10px 18px; margin: 0 0 18px; font-style: italic; }
    .pv-body img { max-width: 100%; height: auto; }

    /* ── EXISTING ARTICLES LIST ── */
    .manage { margin-top: 56px; }
    .manage h2 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .art-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--black-card);
      border: 1px solid rgba(106,15,214,0.2);
      padding: 14px 20px;
      margin-bottom: 8px;
    }
    .art-row .info { min-width: 0; }
    .art-row .t { font-family: var(--font-condensed); font-size: 18px; letter-spacing: 1px; color: var(--silver-light); }
    .art-row .m { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; margin-top: 2px; }
    .badge { font-family: var(--font-condensed); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 9px; }
    .badge.published { color: var(--green); border: 1px solid rgba(63,185,104,0.4); }
    .badge.draft { color: #d9a441; border: 1px solid rgba(217,164,65,0.4); }
    .art-row .ops { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .art-row .ops button { font-family: var(--font-condensed); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; padding: 7px 14px; background: transparent; border: 1px solid rgba(139,47,255,0.4); color: var(--purple-bright); }
    .art-row .ops button:hover { background: rgba(139,47,255,0.12); }

    .hidden { display: none !important; }

    @media (max-width: 860px) {
      .editor-grid { grid-template-columns: 1fr; }
      .preview { display: none; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="brand">The <span>Oracle</span> · Write</a>
    <div class="right">
      <a class="view-link" href="articles.html" target="_blank">View Articles ↗</a>
      <button class="btn btn-ghost" id="logout-btn" style="padding:8px 16px; font-size:12px;">Lock</button>
    </div>
  </div>

  <!-- PASSWORD GATE -->
  <div class="gate" id="gate">
    <h1>The Oracle</h1>
    <p>Enter the admin password to write.</p>
    <input type="password" id="gate-pass" placeholder="Password" autocomplete="current-password" />
    <div style="margin-top:18px;">
      <button class="btn btn-primary" id="gate-btn" style="width:100%; clip-path:none;">Unlock</button>
    </div>
    <div class="gate-error" id="gate-error"></div>
  </div>

  <!-- EDITOR -->
  <div class="wrap hidden" id="app">
    <div class="editor-grid">
      <!-- left: form -->
      <div>
        <div class="col-head" id="editor-mode">New Article</div>
        <input type="hidden" id="art-id" value="" />

        <label for="title">Title</label>
        <input type="text" id="title" placeholder="Basha stuns Perry in overtime thriller" />

        <label for="slug">Slug <span class="hint" style="text-transform:none; letter-spacing:0;">(URL — auto-fills from title)</span></label>
        <input type="text" id="slug" placeholder="basha-stuns-perry" />

        <label for="excerpt">Excerpt <span class="hint" style="text-transform:none; letter-spacing:0;">(shown on the article cards)</span></label>
        <textarea id="excerpt" rows="2" style="min-height:auto;" placeholder="One or two sentences that tease the story."></textarea>

        <div class="row2">
          <div>
            <label for="cover">Cover Image URL</label>
            <input type="text" id="cover" placeholder="https://…" />
          </div>
          <div>
            <label for="tags">Tags <span class="hint" style="text-transform:none; letter-spacing:0;">(comma-separated)</span></label>
            <input type="text" id="tags" placeholder="recap, 6A, playoffs" />
          </div>
        </div>

        <label for="body">Body <span class="hint" style="text-transform:none; letter-spacing:0;">(Markdown — **bold**, ## heading, [link](url), - list)</span></label>
        <textarea id="body" placeholder="Write the article here in Markdown…"></textarea>

        <div class="actions">
          <button class="btn btn-primary" id="publish-btn">Publish</button>
          <button class="btn btn-ghost" id="draft-btn">Save Draft</button>
          <button class="btn btn-ghost" id="new-btn">New</button>
          <span class="save-status" id="save-status"></span>
        </div>
      </div>

      <!-- right: live preview -->
      <div>
        <div class="col-head">Live Preview</div>
        <div class="preview" id="preview"></div>
      </div>
    </div>

    <!-- manage existing -->
    <div class="manage">
      <h2>All Articles</h2>
      <div id="art-list"><div class="m" style="color:var(--text-muted);">Loading…</div></div>
    </div>
  </div>

  <script>
    const API = "https://oracle-api-7q4wz.ondigitalocean.app";
    const TOKEN_KEY = "oracle_admin_token";

    const $ = id => document.getElementById(id);
    const esc = s => (s == null ? "" : String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    const token = () => sessionStorage.getItem(TOKEN_KEY) || "";

    function slugify(s) {
      return (s || "").toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 80);
    }
    function parseTags(s) {
      return (s || "").split(",").map(t => t.trim()).filter(Boolean);
    }

    // ── live preview ──
    function updatePreview() {
      const cover = $("cover").value.trim();
      const tags = parseTags($("tags").value);
      const rawHtml = marked.parse($("body").value || "", { breaks: true });
      const safe = DOMPurify.sanitize(rawHtml, { ADD_ATTR: ['target','rel'] });
      $("preview").innerHTML = `
        ${cover ? `<img class="preview-cover" src="${esc(cover)}" onerror="this.style.display='none'"/>` : ""}
        ${tags.length ? `<div class="pv-tags">${tags.map(t=>`<span class="pv-tag">${esc(t)}</span>`).join("")}</div>` : ""}
        <div class="pv-title">${esc($("title").value) || "Untitled"}</div>
        <div class="pv-body">${safe}</div>`;
    }

    let slugEdited = false;
    $("slug").addEventListener("input", () => { slugEdited = true; });
    $("title").addEventListener("input", () => {
      if (!slugEdited) $("slug").value = slugify($("title").value);
      updatePreview();
    });
    ["body","cover","tags"].forEach(id => $(id).addEventListener("input", updatePreview));

    // ── editor state ──
    function resetForm() {
      $("art-id").value = "";
      ["title","slug","excerpt","cover","tags","body"].forEach(id => $(id).value = "");
      slugEdited = false;
      $("editor-mode").textContent = "New Article";
      setStatus("");
      updatePreview();
    }

    function loadIntoForm(a) {
      $("art-id").value = a.id;
      $("title").value = a.title || "";
      $("slug").value = a.slug || "";
      $("excerpt").value = a.excerpt || "";
      $("cover").value = a.cover_image || "";
      $("tags").value = (a.tags || []).join(", ");
      $("body").value = a.body_markdown || "";
      slugEdited = true;
      $("editor-mode").textContent = "Editing: " + (a.title || "");
      setStatus("");
      updatePreview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setStatus(msg, kind) {
      const el = $("save-status");
      el.textContent = msg;
      el.className = "save-status" + (kind ? " " + kind : "");
    }

    // ── API calls ──
    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        ...opts,
        headers: { "Content-Type": "application/json", "X-Admin-Token": token(), ...(opts.headers||{}) }
      });
      return res;
    }

    async function save(status) {
      const title = $("title").value.trim();
      if (!title) { setStatus("Title is required.", "err"); return; }

      const payload = {
        title,
        slug: $("slug").value.trim() || slugify(title),
        excerpt: $("excerpt").value.trim(),
        cover_image: $("cover").value.trim(),
        tags: parseTags($("tags").value),
        body_markdown: $("body").value,
        status
      };

      const id = $("art-id").value;
      setStatus("Saving…");
      try {
        let res;
        if (id) res = await api(`/article?id=${encodeURIComponent(id)}`, { method: "PUT", body: JSON.stringify(payload) });
        else    res = await api(`/articles`, { method: "POST", body: JSON.stringify(payload) });

        if (res.status === 401) { setStatus("Wrong password — locked out.", "err"); lock(); return; }
        if (!res.ok) throw new Error("HTTP " + res.status);
        const saved = await res.json();
        $("art-id").value = saved.id || id;
        $("editor-mode").textContent = "Editing: " + (saved.title || title);
        setStatus(status === "published" ? "Published ✓" : "Draft saved ✓", "ok");
        loadList();
      } catch (e) {
        console.warn(e);
        setStatus("Save failed — check the API/CORS.", "err");
      }
    }

    async function loadList() {
      const box = $("art-list");
      try {
        const res = await api(`/articles?status=all`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const rows = await res.json();
        if (!rows.length) { box.innerHTML = `<div class="m" style="color:var(--text-muted);">No articles yet.</div>`; return; }
        box.innerHTML = rows.map(a => `
          <div class="art-row">
            <div class="info">
              <div class="t">${esc(a.title)} <span class="badge ${a.status}">${a.status}</span></div>
              <div class="m">/${esc(a.slug)}${a.published_at ? " · " + new Date(a.published_at).toLocaleDateString() : ""}</div>
            </div>
            <div class="ops">
              <button data-edit="${esc(a.slug)}">Edit</button>
              <button class="btn-danger" data-del="${a.id}" data-title="${esc(a.title)}">Delete</button>
            </div>
          </div>`).join("");
        box.querySelectorAll("[data-edit]").forEach(b => b.addEventListener("click", () => openForEdit(b.dataset.edit)));
        box.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => del(b.dataset.del, b.dataset.title)));
      } catch (e) {
        console.warn(e);
        box.innerHTML = `<div class="m" style="color:var(--red);">Could not load articles.</div>`;
      }
    }

    async function openForEdit(slug) {
      setStatus("Loading…");
      try {
        const res = await api(`/article?slug=${encodeURIComponent(slug)}`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        loadIntoForm(await res.json());
      } catch (e) { setStatus("Could not load article.", "err"); }
    }

    async function del(id, title) {
      if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
      try {
        const res = await api(`/article?id=${encodeURIComponent(id)}`, { method: "DELETE" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        if ($("art-id").value === String(id)) resetForm();
        loadList();
      } catch (e) { alert("Delete failed."); }
    }

    // ── gate / auth ──
    function showApp() {
      $("gate").classList.add("hidden");
      $("app").classList.remove("hidden");
      resetForm();
      loadList();
    }
    function lock() {
      sessionStorage.removeItem(TOKEN_KEY);
      $("app").classList.add("hidden");
      $("gate").classList.remove("hidden");
    }
    async function tryUnlock(pass) {
      $("gate-error").textContent = "";
      sessionStorage.setItem(TOKEN_KEY, pass);
      // validate by hitting an authed endpoint
      try {
        const res = await api(`/articles?status=all`);
        if (res.status === 401) { $("gate-error").textContent = "Incorrect password."; sessionStorage.removeItem(TOKEN_KEY); return; }
        if (!res.ok) { $("gate-error").textContent = "Could not reach the API."; sessionStorage.removeItem(TOKEN_KEY); return; }
        showApp();
      } catch (e) {
        $("gate-error").textContent = "Could not reach the API (check CORS).";
        sessionStorage.removeItem(TOKEN_KEY);
      }
    }

    $("gate-btn").addEventListener("click", () => tryUnlock($("gate-pass").value));
    $("gate-pass").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock($("gate-pass").value); });
    $("logout-btn").addEventListener("click", lock);
    $("publish-btn").addEventListener("click", () => save("published"));
    $("draft-btn").addEventListener("click", () => save("draft"));
    $("new-btn").addEventListener("click", resetForm);

    // auto-unlock if a token is already in this tab's session
    if (token()) tryUnlock(token()); else updatePreview();
  </script>

</body>
</html>
